name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Deploy to OSS via aliyun CLI
        env:
          ALIBABACLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_ACCESS_KEY_ID }}
          ALIBABACLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          # Install aliyun CLI
          curl -fsSL -o aliyun-cli.tar.gz https://aliyuncli.alicdn.com/aliyun-cli-linux-3.4.2-amd64.tgz
          tar xzf aliyun-cli.tar.gz
          sudo mv aliyun /usr/local/bin/
          
          # Delete all objects 
          aliyun oss rm "oss://$OSS_BUCKET/" -r -f 2>/dev/null || true
          
          # Create bucket if needed (with public-read)
          aliyun oss mb "oss://$OSS_BUCKET" --acl public-read 2>/dev/null || true
          
          # Upload files one by one
          cd out
          for f in $(find . -type f); do
            dest="oss://$OSS_BUCKET/${f#./}"
            aliyun oss cp "$f" "$dest" --acl public-read -f 2>/dev/null
          done
          cd ..
          
          # Set website config
          aliyun oss website --method put "oss://$OSS_BUCKET" index.html 404.html 2>/dev/null || true
          
          echo "✅ Deployed"
