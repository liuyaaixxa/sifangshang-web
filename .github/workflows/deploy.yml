name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Install ossutil
        run: |
          curl -fsSL -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-linux-amd64.zip
          unzip -q ossutil.zip
          sudo mv ossutil-linux-amd64/ossutil /usr/local/bin/ossutil
          chmod +x /usr/local/bin/ossutil

      - name: Deploy to OSS
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIBABA_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          ossutil config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"

          # Create bucket
          ossutil mb "oss://$OSS_BUCKET" 2>/dev/null || echo "Bucket exists"

          # Set bucket ACL
          ossutil bucket-acl "oss://$OSS_BUCKET" --acl public-read -f 2>/dev/null || echo "ACL may need manual setting"

          # Enable static website hosting
          ossutil website "oss://$OSS_BUCKET" --method put --index index.html --error 404.html 2>/dev/null || echo "Website config may need manual setting"

          # Upload files (with individual ACL)
          ossutil sync out/ "oss://$OSS_BUCKET/" --delete --acl public-read -f

          echo "✅ Deployed: http://$OSS_BUCKET.$OSS_ENDPOINT"
