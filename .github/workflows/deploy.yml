name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Install ossutil
        run: |
          curl -fsSL -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-linux-amd64.zip
          unzip -q ossutil.zip
          sudo mv ossutil-linux-amd64/ossutil /usr/local/bin/ossutil
          chmod +x /usr/local/bin/ossutil

      - name: Deploy to OSS
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIBABA_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          ossutil config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"
          
          # Clear Content-Disposition and force-download from all objects
          ossutil set-meta "oss://$OSS_BUCKET/" --include "*.html" --meta "Content-Disposition:" -r -f 2>/dev/null || true
          ossutil set-meta "oss://$OSS_BUCKET/" --include "*.js" --meta "Content-Disposition:" -r -f 2>/dev/null || true
          ossutil set-meta "oss://$OSS_BUCKET/" --include "*.css" --meta "Content-Disposition:" -r -f 2>/dev/null || true
          
          # Sync files without force-download
          ossutil sync out/ "oss://$OSS_BUCKET/" --delete --acl public-read --meta "Content-Disposition:" -f
          
          echo "✅ Deployed to: http://$OSS_BUCKET.$OSS_ENDPOINT"
